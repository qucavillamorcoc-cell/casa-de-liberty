{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Casa de Liberty</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22%3E%3Ctext%20y=%22.9em%22%20font-size=%2290%22%3E%F0%9F%8F%A8%3C/text%3E%3C/svg%3E">
    <!-- Global Theme Manager - Load early to prevent theme flashing -->
    <script src="{% static 'js/theme.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
</head>
<body style="background:
    radial-gradient(circle at 12% 0%, rgba(14, 165, 233, 0.16), transparent 34%),
    radial-gradient(circle at 88% 16%, rgba(59, 130, 246, 0.12), transparent 36%),
    linear-gradient(180deg, #f7fbff 0%, #eef5ff 54%, #f7fbff 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">

<div class="form-container">
    <!-- Logo -->
    <div class="form-header">
        <div class="form-logo">🏨</div>
        <h1 class="form-title">Casa de Liberty</h1>
        <p class="form-subtitle">Create your account</p>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Register Form -->
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" placeholder="Choose a username" required class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Email Address *</label>
            <input type="email" name="email" placeholder="your.email@example.com" required class="form-input">
            <small style="color: #64748b; font-size: 12px;">Required for OTP verification when changing password</small>
        </div>

        <div class="form-group">
            <label class="form-label">Contact Number (Optional)</label>
            <input type="tel" name="contact_number" placeholder="Your phone number" class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" placeholder="Choose a password" required class="form-input">
        </div>
        
        <button type="submit" class="btn-primary">
            Create Account
        </button>
    </form>

    <!-- Login Link -->
    <div class="form-footer">
        <p>Already have an account? 
            <a href="{% url 'login' %}" class="form-link">Sign In</a>
        </p>
    </div>

    <!-- Home Link -->
    <a href="{% url 'home' %}" class="form-back-link">← Back to Home</a>
</div>

<script src="{% static 'js/interactive.js' %}"></script>

<script>
    // Page Transition Animations
    document.addEventListener('DOMContentLoaded', function() {
        const formWrapper = document.querySelector('.form-wrapper');
        const formContainer = document.querySelector('.form-container');
        
        if (formWrapper) formWrapper.style.animation = 'pageTransitionIn 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
        if (formContainer) formContainer.style.animation = 'pageTransitionIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s backwards';
    });

    // Add smooth transitions when navigating
    const navLinks = document.querySelectorAll('a');
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            if (!this.target && !this.href.includes('#') && !this.onclick) {
                document.body.style.animation = 'pageTransitionOut 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            }
        });
    });
</script>

<style>
    @keyframes pageTransitionIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pageTransitionOut {
        from {
            opacity: 1;
            transform: translateY(0);
        }
        to {
            opacity: 0;
            transform: translateY(-20px);
        }
    }
</style>

</body>
</html>
